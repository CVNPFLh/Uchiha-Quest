<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Quest - Mangekyo Edition</title>
    <style>
        :root { --main-red: #ff0000; --dark-red: #800000; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }
        
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('8603.jpg') no-repeat center center; 
            background-size: cover; display: flex; align-items: center; justify-content: flex-start;
        }

        /* منطقة اللعب الزجاجية المتوهجة */
        #play-screen {
            position: relative; width: 50%; height: 85%; margin-left: 5%;
            border: 2px solid var(--main-red); border-radius: 15px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            box-shadow: 0 0 25px var(--dark-red), inset 0 0 15px var(--dark-red);
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* واجهة المعلومات */
        .hud { position: absolute; top: 20px; right: 20px; text-align: right; }
        .score-label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        .score-num { font-size: 36px; color: var(--main-red); font-weight: bold; text-shadow: 0 0 10px var(--main-red); }

        /* أزرار التحكم - تصميم حديث */
        .controls-hub { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; }
        .btn { 
            width: 65px; height: 65px; background: rgba(20, 20, 20, 0.8); 
            border: 1px solid var(--main-red); border-radius: 50%; 
            color: var(--main-red); display: flex; align-items: center; justify-content: center; 
            font-size: 24px; box-shadow: 0 0 10px rgba(255,0,0,0.2);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); background: var(--main-red); color: white; box-shadow: 0 0 20px var(--main-red); }

        .restart-pill { 
            margin-top: 20px; padding: 10px 30px; background: none; 
            border: 1px solid white; color: white; border-radius: 20px; 
            font-size: 14px; cursor: pointer; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="play-screen">
        <canvas id="stage"></canvas>
    </div>

    <div class="hud">
        <div class="score-label">Uchiha Spirit</div>
        <div class="score-num" id="score">0</div>
    </div>

    <div class="controls-hub">
        <div class="d-pad">
            <div></div><div class="btn" ontouchstart="move('u')">▲</div><div></div>
            <div class="btn" ontouchstart="move('l')">◀</div><div class="btn" ontouchstart="move('d')">▼</div><div class="btn" ontouchstart="move('r')">▶</div>
        </div>
        <button class="restart-pill" onclick="location.reload()">RE-SYNC DNA</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    
    let w, h, player = {x: 0, y: 0, s: 35}, items = [], score = 0;

    function init() {
        w = canvas.width = canvas.offsetWidth;
        h = canvas.height = canvas.offsetHeight;
        player.x = w/2 - 17; player.y = h - 60;
    }
    window.onresize = init; init();

    function move(d) {
        const step = 25;
        if(d=='u' && player.y > 0) player.y -= step;
        if(d=='d' && player.y < h - player.s) player.y += step;
        if(d=='l' && player.x > 0) player.x -= step;
        if(d=='r' && player.x < w - player.s) player.x += step;
    }

    function createItem() {
        items.push({x: Math.random()*(w-20), y: -20, v: 3 + Math.random()*4, type: Math.random() > 0.5 ? 'shuriken' : 'crow'});
    }

    function draw() {
        ctx.clearRect(0,0,w,h);

        // تأثير الريش المتساقط (جمالية فقط)
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        for(let i=0; i<5; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 1, 10);

        // اللاعب (مربع متوهج - سنضع مكانه صورة لاحقاً)
        ctx.save();
        ctx.shadowBlur = 20; ctx.shadowColor = "red";
        ctx.fillStyle = "white";
        ctx.fillRect(player.x, player.y, player.s, player.s);
        ctx.restore();

        // الأعداء
        items.forEach((it, i) => {
            it.y += it.v;
            ctx.fillStyle = it.type == 'shuriken' ? "#ff0000" : "#444";
            ctx.beginPath();
            ctx.arc(it.x, it.y, 8, 0, Math.PI*2);
            ctx.fill();

            // فحص الاصطدام
            if(player.x < it.x+8 && player.x+player.s > it.x-8 && player.y < it.y+8 && player.y+player.s > it.y-8) {
                alert("Game Over! Score: " + score);
                location.reload();
            }

            if(it.y > h) { items.splice(i, 1); score++; scoreDisplay.innerText = score; }
        });

        if(Math.random() < 0.05) createItem();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
