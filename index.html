<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Quest - Itachi Edition</title>
    <style>
        body { margin: 0; background: #000; color: #f00; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: url('https://w0.peakpx.com/wallpaper/1004/149/HD-wallpaper-itachi-uchiha-dark-background-itachi-uchiha-naruto-shippuden-uchiha-clan.jpg') no-repeat center center; background-size: cover; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .score { position: absolute; top: 20px; right: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        .title { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 28px; color: #ff0000; text-shadow: 0 0 10px #f00; }
        .controls { position: absolute; bottom: 40px; right: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; pointer-events: auto; }
        .btn { width: 60px; height: 60px; background: rgba(0,0,0,0.7); border: 2px solid #f00; border-radius: 50%; color: #f00; font-size: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .btn:active { background: #f00; color: #000; }
        .restart-btn { position: absolute; bottom: 40px; left: 20px; width: 80px; height: 80px; background: #900; border: 3px solid #f00; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-layer">
        <div class="title">Uchiha Quest</div>
        <div class="score">SCORE: <span id="scoreVal">0</span></div>
        
        <div class="controls">
            <div></div><div class="btn" ontouchstart="move('up')">↑</div><div></div>
            <div class="btn" ontouchstart="move('left')">←</div><div class="btn" ontouchstart="move('down')">↓</div><div class="btn" ontouchstart="move('right')">→</div>
        </div>
        
        <div class="restart-btn" onclick="location.reload()">Restart</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = { x: canvas.width/2 - 20, y: canvas.height/2, size: 40 };
    let score = 0;
    let feathers = [];
    let shurikens = [];

    // إنشاء الريش المتساقط
    function createFeather() {
        feathers.push({ x: Math.random() * canvas.width, y: -20, speed: 1 + Math.random() * 2, drift: Math.sin(Math.random()) });
    }

    // إنشاء الشوريكين (الأعداء)
    function createShuriken() {
        shurikens.push({ x: Math.random() * canvas.width, y: -50, speed: 4 + Math.random() * 3, rot: 0 });
    }

    function move(dir) {
        const step = 30;
        if(dir === 'up') player.y -= step;
        if(dir === 'down') player.y += step;
        if(dir === 'left') player.x -= step;
        if(dir === 'right') player.x += step;
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // تحريك الريش
        feathers.forEach((f, i) => {
            f.y += f.speed;
            f.x += Math.sin(f.y / 50);
            ctx.fillStyle = "rgba(50, 50, 50, 0.6)";
            ctx.beginPath();
            ctx.ellipse(f.x, f.y, 4, 12, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();
            if(f.y > canvas.height) feathers.splice(i, 1);
        });

        // تحريك الشوريكين (شعار الأوتشيها المضيء)
        shurikens.forEach((s, i) => {
            s.y += s.speed;
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#f00";
            ctx.beginPath();
            ctx.arc(s.x, s.y, 15, 0, Math.PI * 2); // دائرة تمثل الشعار
            ctx.fill();
            ctx.shadowBlur = 0;

            // اصطدام
            if(Math.hypot(player.x - s.x, player.y - s.y) < 30) location.reload();
            if(s.y > canvas.height) { shurikens.splice(i, 1); score++; document.getElementById('scoreVal').innerText = score; }
        });

        // رسم اللاعب (توهج أحمر)
        ctx.fillStyle = "#f00";
        ctx.shadowBlur = 20; ctx.shadowColor = "#f00";
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.shadowBlur = 0;

        if(Math.random() < 0.05) createFeather();
        if(Math.random() < 0.03) createShuriken();

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
