<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Quest - Tactical</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        
        /* الخلفية هي الصورة التي أرسلتها */
        #main-ui { 
            position: relative; width: 100vw; height: 100vh; 
            background: url('8603.jpg') no-repeat center center; 
            background-size: cover; 
        }

        /* منطقة اللعب المحددة في الجهة اليسرى كما في الصورة */
        #game-box {
            position: absolute; left: 5%; top: 10%; width: 45%; height: 75%;
            border: 2px solid #ff0000; box-shadow: 0 0 20px #f00;
            background: rgba(0, 0, 0, 0.5); /* شفافية لرؤية إيتاتشي خلفها */
        }

        canvas { width: 100%; height: 100%; }

        /* تنسيق العنوان والنقاط بنفس مكان الصورة */
        .title-text { position: absolute; top: 5%; left: 35%; color: #f00; font-size: 28px; text-shadow: 0 0 10px #f00; font-weight: bold; }
        .score-text { position: absolute; top: 5%; right: 5%; color: #f00; font-size: 24px; font-weight: bold; }

        /* أزرار التحكم - وضعناها في الأسفل يميناً لتطابق الصورة */
        .d-pad { position: absolute; bottom: 10%; right: 5%; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .control-btn { 
            width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #f00; 
            border-radius: 50%; color: #f00; font-size: 24px; display: flex; align-items: center; justify-content: center;
        }
        .control-btn:active { background: #f00; color: #000; }
        
        .restart-trigger { position: absolute; bottom: 10%; right: 5%; transform: translate(-140px, 65px); width: 70px; height: 70px; background: #800; border: 2px solid #f00; border-radius: 50%; color: #fff; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="title-text">Uchiha Quest</div>
    <div class="score-text">SCORE: <span id="s-val">0</span></div>

    <div id="game-box">
        <canvas id="stage"></canvas>
    </div>

    <div class="d-pad">
        <div></div><div class="control-btn" ontouchstart="m('u')">↑</div><div></div>
        <div class="control-btn" ontouchstart="m('l')">←</div><div class="control-btn" ontouchstart="m('d')">↓</div><div class="control-btn" ontouchstart="m('r')">→</div>
    </div>
    <button class="restart-trigger" onclick="location.reload()">RESTART</button>
</div>

<script>
    const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
    let w, h, player = {x: 20, y: 100, s: 30}, obstacles = [], score = 0;

    function init() {
        w = canvas.width = canvas.offsetWidth;
        h = canvas.height = canvas.offsetHeight;
        player.y = h/2;
    }
    window.onresize = init; init();

    function m(d) {
        if(d=='u' && player.y > 0) player.y -= 25;
        if(d=='d' && player.y < h - player.s) player.y += 25;
        if(d=='l' && player.x > 0) player.x -= 25;
        if(d=='r' && player.x < w - player.s) player.x += 25;
    }

    function draw() {
        ctx.clearRect(0,0,w,h);

        // اللاعب (توهج أحمر - يمثل شعار الأوتشيها)
        ctx.fillStyle = "#f00"; ctx.shadowBlur = 15; ctx.shadowColor = "#f00";
        ctx.fillRect(player.x, player.y, player.s, player.s);

        // الأعداء (الشوريكين)
        obstacles.forEach((o, i) => {
            o.x -= o.v;
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.arc(o.x, o.y, 8, 0, 7); ctx.fill();
            
            if(player.x < o.x+8 && player.x+player.s > o.x-8 && player.y < o.y+8 && player.y+player.s > o.y-8) location.reload();
            if(o.x < 0) { obstacles.splice(i, 1); score++; document.getElementById('s-val').innerText = score; }
        });

        if(Math.random() < 0.05) obstacles.push({x: w, y: Math.random()*h, v: 3+Math.random()*3});
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
