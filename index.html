<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uchiha Quest - Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            background: url('8603.jpg') no-repeat center center; 
            background-size: cover; 
        }
        /* تأثير المطر الأحمر (غينجيتسو) */
        .rain { position: absolute; width: 2px; height: 50px; background: rgba(255, 0, 0, 0.3); pointer-events: none; }
        
        #play-area {
            position: absolute; left: 5%; top: 10%; width: 55%; height: 75%;
            border: 2px solid #f00; box-shadow: 0 0 20px #f00;
            background: rgba(0, 0, 0, 0.5); overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        .score-board { position: absolute; top: 20px; right: 20px; color: #ff0000; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #000; }
        
        /* أزرار التحكم */
        .controls { position: absolute; bottom: 40px; right: 20px; display: grid; grid-template-columns: repeat(3, 65px); gap: 12px; }
        .btn { width: 65px; height: 65px; background: rgba(20, 20, 20, 0.9); border: 2px solid #f00; border-radius: 50%; color: #f00; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 10px #f00; }
        .btn:active { background: #f00; color: #000; }
        .restart { position: absolute; bottom: 40px; left: 20px; padding: 15px; background: #600; color: #fff; border: 2px solid #f00; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="score-board">SCORE: <span id="sc">0</span></div>
    <div id="play-area"><canvas id="g"></canvas></div>
    
    <div class="controls">
        <div></div><div class="btn" ontouchstart="mv('u')">↑</div><div></div>
        <div class="btn" ontouchstart="mv('l')">←</div><div class="btn" ontouchstart="mv('d')">↓</div><div class="btn" ontouchstart="mv('r')">→</div>
    </div>
    <button class="restart" onclick="location.reload()">RESTART</button>
</div>

<script>
    const c = document.getElementById('g'), x = c.getContext('2d');
    const scE = document.getElementById('sc');
    let p = {x: 50, y: 150, s: 30}, en = [], sc = 0;

    function resize() { c.width = c.offsetWidth; c.height = c.offsetHeight; }
    window.onresize = resize; resize();

    function mv(d) {
        if(d=='u' && p.y > 0) p.y -= 25;
        if(d=='d' && p.y < c.height-p.s) p.y += 25;
        if(d=='l' && p.x > 0) p.x -= 25;
        if(d=='r' && p.x < c.width-p.s) p.x += 25;
    }

    function spawn() { en.push({x: c.width, y: Math.random()*(c.height-20), v: 3 + Math.random()*3}); }

    function frame() {
        x.clearRect(0,0,c.width,c.height);
        
        // رسم اللاعب (توهج أحمر)
        x.fillStyle = "#f00"; x.shadowBlur = 15; x.shadowColor = "#f00";
        x.fillRect(p.x, p.y, p.s, p.s);

        // رسم الأعداء (الشوريكين)
        en.forEach((e, i) => {
            e.x -= e.v;
            x.fillStyle = "#fff"; x.shadowBlur = 5;
            x.beginPath(); x.arc(e.x, e.y, 10, 0, 7); x.fill();
            
            if(p.x < e.x+10 && p.x+p.s > e.x-10 && p.y < e.y+10 && p.y+p.s > e.y-10) location.reload();
            if(e.x < 0) { en.splice(i, 1); sc++; scE.innerText = sc; }
        });

        if(Math.random() < 0.04) spawn();
        requestAnimationFrame(frame);
    }
    frame();
</script>
</body>
</html>
